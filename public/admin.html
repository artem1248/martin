<!DOCTYPE html>

<html lang="uk">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Martin Admin</title>

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&display=swap"
rel="stylesheet">

<style>

*{

margin:0;
padding:0;
box-sizing:border-box;

}

body{

background:#f6efe6;

font-family:Poppins,sans-serif;

padding:25px;

}

.container{

max-width:700px;

margin:auto;

}

h1{

text-align:center;

margin-bottom:30px;

color:#5d402b;

}

.card{

background:white;

border-radius:20px;

padding:20px;

margin-bottom:18px;

box-shadow:

0 15px 40px rgba(0,0,0,.08);

}

.name{

font-size:22px;

font-weight:700;

margin-bottom:8px;

}

.amount{

font-size:18px;

color:#777;

margin-bottom:18px;

}

.buttons{

display:flex;

gap:12px;

}

button{

flex:1;

height:50px;

border:none;

border-radius:14px;

font-size:16px;

font-weight:700;

cursor:pointer;

}

.approve{

background:#36c86c;

color:white;

}

.delete{

background:#ef4444;

color:white;

}

.empty{

text-align:center;

color:#777;

padding:40px;

}

</style>

</head>

<body>

<div class="container">

<h1>

🐶 Martin Admin

</h1>

<div id="list">

</div>

</div>

<script>
  async function load(){

const res=

await fetch(

"/api/admin/donations"

);

const data=

await res.json();

const list=

document.getElementById("list");

list.innerHTML="";

if(data.length===0){

list.innerHTML=

'<div class="empty">Нових донатів немає ❤️</div>';

return;

}

data.forEach(item=>{

const div=

document.createElement("div");

div.className="card";

div.innerHTML=`

<div class="name">

${item.nickname}

</div>

<div class="amount">

${item.amount} грн

</div>

<div class="buttons">

<button

class="approve"

onclick="approve(${item.id})">

Підтвердити

</button>

<button

class="delete"

onclick="removeDonate(${item.id})">

Видалити

</button>

</div>

`;

list.appendChild(div);

});

}
  async function approve(id){

await fetch(

"/api/admin/approve",

{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

id

})

}

);

load();

}

async function removeDonate(id){

await fetch(

"/api/admin/delete",

{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

id

})

}

);

load();

}

load();

</script>

</body>

</html>
